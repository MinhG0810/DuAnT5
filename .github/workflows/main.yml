name: Build & Push Docker Image

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # 2. Login Docker Hub (Sử dụng Action chính thức)
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build & Tag Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/duan-java:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/duan-java:latest ${{ secrets.DOCKER_USERNAME }}/duan-java:${{ github.sha }}

      # 4. Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/duan-java:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/duan-java:${{ github.sha }}

      # 5. Deploy lên DevOps Classroom
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="${{ secrets.DOCKER_USERNAME }}/duan-java"
          CONTAINER_PORT=80
          # Gửi request và lấy HTTP Code
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=7&container_port=$CONTAINER_PORT")
          
          # Tách Body và Code
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "Webhook HTTP Status: $CODE"
          echo "Response Body: $BODY"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "❌ Deploy thất bại!"
            exit 1
          fi

          echo "✅ Deploy thành công!"
